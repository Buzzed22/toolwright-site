<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cakes by Debra Warburton — Instant Quote</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #FBF0F0;
    --card: #FFFFFF;
    --ink: #3A2A2A;
    --ink-soft: #7A6363;
    --berry: #B9445E;
    --butter: #E4A63B;
    --line: #F0DCDC;
    --radius: 16px;
  }
  *{ box-sizing:border-box; }
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:'Inter', sans-serif; padding:40px 20px;
  }
  .wrap{ max-width:980px; margin:0 auto; }
  .masthead{
    display:flex; align-items:baseline; justify-content:space-between;
    margin-bottom:26px; flex-wrap:wrap; gap:10px;
  }
  .brand{ font-family:'Fredoka', sans-serif; font-weight:700; font-size:27px; color:var(--berry); }
  .brand span{ color:var(--butter); }
  .tag{ font-size:12px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:0.09em; }

  .grid{ display:grid; grid-template-columns: 1.3fr 1fr; gap:26px; }
  @media (max-width:780px){ .grid{ grid-template-columns:1fr; } }

  .card{ background:var(--card); border-radius:var(--radius); border:1px solid var(--line); padding:28px; }
  h2{ font-family:'Fredoka', sans-serif; font-weight:700; font-size:19px; margin:0 0 20px 0; color:var(--berry); }
  .field{ margin-bottom:22px; }
  .field label{ display:flex; justify-content:space-between; font-size:14px; font-weight:500; margin-bottom:8px; }

  .stepper{ display:flex; align-items:center; gap:14px; }
  .stepper button{
    width:32px; height:32px; border-radius:8px; border:1px solid var(--line);
    background:var(--bg); color:var(--berry); font-size:16px; font-weight:700; cursor:pointer;
  }
  .stepper button:hover{ background:var(--berry); color:white; }
  .stepper .count{ font-family:'Space Mono', monospace; font-size:16px; min-width:24px; text-align:center; }

  .pillrow{ display:flex; gap:8px; flex-wrap:wrap; }
  .pill{
    padding:9px 14px; border-radius:999px; border:1px solid var(--line);
    background:var(--bg); font-size:13px; cursor:pointer; color:var(--ink-soft);
  }
  .pill.active{ background:var(--berry); color:white; border-color:var(--berry); }

  .checks{ display:flex; flex-direction:column; gap:10px; }
  .check{ display:flex; align-items:center; gap:10px; font-size:14px; cursor:pointer; }
  .check input{ accent-color: var(--butter); width:16px; height:16px; }
  .check .price{ margin-left:auto; font-family:'Space Mono', monospace; color:var(--ink-soft); font-size:13px; }

  .ticket{ background:var(--berry); color:white; border-radius:var(--radius); padding:26px; }
  .ticket h2{ color:white; }
  .t-line{
    display:flex; justify-content:space-between; font-family:'Space Mono', monospace;
    font-size:13px; padding:8px 0; border-bottom:1px dashed rgba(255,255,255,0.22);
  }
  .t-line.muted{ opacity:0.75; }
  .t-total{ display:flex; justify-content:space-between; align-items:baseline; margin-top:16px; }
  .t-total .amount{ font-family:'Space Mono', monospace; font-size:34px; font-weight:700; color:#F6D593; }
  .cta{
    display:block; width:100%; margin-top:18px; padding:14px; border:none; border-radius:10px;
    background:var(--butter); color:white; font-family:'Inter', sans-serif; font-weight:700; font-size:14px; cursor:pointer;
  }
  .note{ text-align:center; font-size:11px; color:var(--ink-soft); margin-top:10px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="masthead">
    <div class="brand">Cakes by <span>Debra</span></div>
    <div class="tag">Instant Quote · Carlisle</div>
  </div>

  <div class="grid">
    <div class="card">
      <h2>Your cake</h2>

      <div class="field">
        <label>Servings</label>
        <div class="stepper">
          <button onclick="step(-5)">−</button>
          <div class="count" id="servVal">20</div>
          <button onclick="step(5)">+</button>
        </div>
      </div>

      <div class="field">
        <label>Tiers</label>
        <div class="pillrow" id="tierRow">
          <div class="pill active" data-mult="1">1 tier</div>
          <div class="pill" data-mult="1.8">2 tiers</div>
          <div class="pill" data-mult="2.6">3 tiers</div>
        </div>
      </div>

      <div class="field">
        <label>Design complexity</label>
        <div class="pillrow" id="designRow">
          <div class="pill active" data-mult="1">Simple / semi-naked</div>
          <div class="pill" data-mult="1.3">Decorated</div>
          <div class="pill" data-mult="1.7">Sculpted / novelty</div>
        </div>
      </div>

      <div class="field" style="margin-bottom:0;">
        <label>Add-ons</label>
        <div class="checks">
          <label class="check"><input type="checkbox" class="extra" data-price="35" data-label="Matching cupcakes (dozen)"> Matching cupcakes (dozen) <span class="price">+£35</span></label>
          <label class="check"><input type="checkbox" class="extra" data-price="20" data-label="Fresh flowers"> Fresh flowers <span class="price">+£20</span></label>
          <label class="check"><input type="checkbox" class="extra" data-price="15" data-label="Cake topper"> Cake topper <span class="price">+£15</span></label>
        </div>
      </div>
    </div>

    <div class="ticket">
      <h2>Estimate</h2>
      <div class="t-line"><span id="rServ">20 servings · 1 tier</span><span id="rBase">£—</span></div>
      <div id="rExtras"></div>
      <div class="t-total">
        <span>Total</span>
        <span class="amount" id="rTotal">£0</span>
      </div>
      <button class="cta">Enquire about this cake</button>
      <div class="note">Estimate only — Debra confirms final price &amp; flavours with you</div>
    </div>
  </div>
</div>

<script>
  let servings = 20;

  function step(dir){
    servings = Math.max(10, Math.min(150, servings+dir));
    document.getElementById('servVal').textContent = servings;
    calc();
  }

  document.querySelectorAll('#tierRow .pill').forEach(p=>{
    p.addEventListener('click', ()=>{
      document.querySelectorAll('#tierRow .pill').forEach(x=>x.classList.remove('active'));
      p.classList.add('active');
      calc();
    });
  });

  document.querySelectorAll('#designRow .pill').forEach(p=>{
    p.addEventListener('click', ()=>{
      document.querySelectorAll('#designRow .pill').forEach(x=>x.classList.remove('active'));
      p.classList.add('active');
      calc();
    });
  });

  document.querySelectorAll('.extra').forEach(c=> c.addEventListener('change', calc));

  function calc(){
    const tierPill = document.querySelector('#tierRow .pill.active');
    const tierMult = parseFloat(tierPill.dataset.mult);
    const tierName = tierPill.textContent;

    const designPill = document.querySelector('#designRow .pill.active');
    const designMult = parseFloat(designPill.dataset.mult);

    const perServing = 3.2;
    const base = servings * perServing * tierMult * designMult;

    let extrasTotal = 0;
    let extrasHtml = '';
    document.querySelectorAll('.extra:checked').forEach(c=>{
      const price = parseFloat(c.dataset.price);
      extrasTotal += price;
      extrasHtml += `<div class="t-line muted"><span>${c.dataset.label}</span><span>+£${price}</span></div>`;
    });

    const total = base + extrasTotal;

    document.getElementById('rServ').textContent = `${servings} servings · ${tierName}`;
    document.getElementById('rBase').textContent = `£${base.toFixed(0)}`;
    document.getElementById('rExtras').innerHTML = extrasHtml;
    document.getElementById('rTotal').textContent = `£${total.toFixed(0)}`;
  }

  calc();
</script>
</body>
</html>
