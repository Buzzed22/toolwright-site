<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Haul & Co. — Instant Moving Quote</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #EDF0F3;
    --card: #FFFFFF;
    --ink: #22262B;
    --ink-soft: #616B75;
    --denim: #2E4A6B;
    --orange: #E8622C;
    --line: #DCE1E6;
    --radius: 12px;
  }
  *{ box-sizing:border-box; }
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'DM Sans', sans-serif;
    padding:40px 20px;
  }
  .wrap{ max-width:1000px; margin:0 auto; }
  .masthead{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom:24px;
    flex-wrap:wrap;
    gap:10px;
  }
  .brand{
    font-family:'Barlow Condensed', sans-serif;
    font-weight:700;
    font-size:34px;
    text-transform:uppercase;
    letter-spacing:0.02em;
    color:var(--denim);
  }
  .brand span{ color:var(--orange); }
  .tag{
    font-size:12px;
    color:var(--ink-soft);
    text-transform:uppercase;
    letter-spacing:0.1em;
  }

  /* Truck gauge */
  .gauge-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:20px 24px;
    margin-bottom:24px;
  }
  .gauge-top{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-bottom:10px;
  }
  .gauge-label{ font-size:12px; text-transform:uppercase; letter-spacing:0.08em; color:var(--ink-soft); }
  .gauge-pct{ font-family:'Space Mono', monospace; font-weight:700; font-size:18px; color:var(--orange); }
  .gauge-track{
    height:22px;
    background:var(--bg);
    border-radius:6px;
    overflow:hidden;
    border:1px solid var(--line);
    display:flex;
  }
  .gauge-fill{
    height:100%;
    background: repeating-linear-gradient(45deg, var(--orange), var(--orange) 10px, #F0824F 10px, #F0824F 20px);
    transition: width 0.25s ease;
    border-radius:6px 0 0 6px;
  }

  .grid{ display:grid; grid-template-columns: 1.3fr 1fr; gap:24px; }
  @media (max-width:780px){ .grid{ grid-template-columns:1fr; } }

  .card{
    background:var(--card);
    border-radius:var(--radius);
    border:1px solid var(--line);
    padding:26px;
  }
  h2{
    font-family:'Barlow Condensed', sans-serif;
    text-transform:uppercase;
    letter-spacing:0.03em;
    font-size:19px;
    font-weight:700;
    margin:0 0 18px 0;
    color:var(--denim);
  }
  .field{ margin-bottom:22px; }
  .field label{
    display:flex; justify-content:space-between;
    font-size:14px; font-weight:500; margin-bottom:8px;
  }
  .field label .val{ font-family:'Space Mono', monospace; color:var(--orange); font-weight:700; }
  input[type=range]{ width:100%; accent-color: var(--orange); }

  .pillrow{ display:flex; gap:8px; flex-wrap:wrap; }
  .pill{
    padding:8px 14px; border-radius:8px;
    border:1px solid var(--line); background:var(--bg);
    font-size:13px; cursor:pointer; color:var(--ink-soft);
  }
  .pill.active{ background:var(--denim); color:white; border-color:var(--denim); }

  .checks{ display:flex; flex-direction:column; gap:10px; }
  .check{ display:flex; align-items:center; gap:10px; font-size:14px; cursor:pointer; }
  .check input{ accent-color: var(--orange); width:16px; height:16px; }
  .check .price{ margin-left:auto; font-family:'Space Mono', monospace; color:var(--ink-soft); font-size:13px; }

  /* Ticket */
  .ticket{
    background:var(--denim);
    color:white;
    border-radius:var(--radius);
    padding:26px;
    position:relative;
  }
  .ticket h2{ color:white; }
  .t-line{
    display:flex; justify-content:space-between;
    font-family:'Space Mono', monospace;
    font-size:13px;
    padding:8px 0;
    border-bottom:1px dashed rgba(255,255,255,0.2);
  }
  .t-line.muted{ opacity:0.7; }
  .t-total{
    display:flex; justify-content:space-between; align-items:baseline;
    margin-top:16px;
  }
  .t-total .amount{
    font-family:'Space Mono', monospace;
    font-size:34px; font-weight:700; color:#FFB088;
  }
  .cta{
    display:block; width:100%; margin-top:18px;
    padding:14px; border:none; border-radius:8px;
    background:var(--orange); color:white;
    font-family:'DM Sans', sans-serif; font-weight:700; font-size:14px; cursor:pointer;
  }
  .note{ text-align:center; font-size:11px; color:var(--ink-soft); margin-top:10px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="masthead">
    <div class="brand">Haul <span>& Co.</span></div>
    <div class="tag">Instant Moving Quote</div>
  </div>

  <div class="gauge-card">
    <div class="gauge-top">
      <span class="gauge-label">Estimated truck capacity</span>
      <span class="gauge-pct" id="gaugePct">25%</span>
    </div>
    <div class="gauge-track"><div class="gauge-fill" id="gaugeFill" style="width:25%"></div></div>
  </div>

  <div class="grid">
    <div class="card">
      <h2>Your move</h2>

      <div class="field">
        <label>Home size</label>
        <div class="pillrow" id="sizeRow">
          <div class="pill" data-movers="2" data-hours="2" data-fill="25">Studio</div>
          <div class="pill active" data-movers="2" data-hours="3" data-fill="40">1 Bed</div>
          <div class="pill" data-movers="3" data-hours="4" data-fill="60">2 Bed</div>
          <div class="pill" data-movers="4" data-hours="6" data-fill="80">3 Bed</div>
          <div class="pill" data-movers="5" data-hours="8" data-fill="100">4+ Bed</div>
        </div>
      </div>

      <div class="field">
        <label>Distance <span class="val" id="distVal">12 mi</span></label>
        <input type="range" id="dist" min="1" max="500" step="1" value="12">
      </div>

      <div class="field">
        <label>Movers on the job</label>
        <div class="pillrow">
          <button onclick="step(-1)" style="width:32px;height:32px;border-radius:8px;border:1px solid var(--line);background:var(--bg);cursor:pointer;font-weight:700;">−</button>
          <div style="font-family:'Space Mono',monospace;font-size:16px;padding:6px 12px;" id="moversVal">2</div>
          <button onclick="step(1)" style="width:32px;height:32px;border-radius:8px;border:1px solid var(--line);background:var(--bg);cursor:pointer;font-weight:700;">+</button>
        </div>
      </div>

      <div class="field" style="margin-bottom:0;">
        <label>Extras</label>
        <div class="checks">
          <label class="check"><input type="checkbox" class="extra" data-price="150" data-label="Piano"> Piano <span class="price">+$150</span></label>
          <label class="check"><input type="checkbox" class="extra" data-price="100" data-label="Safe / heavy furniture"> Safe / heavy furniture <span class="price">+$100</span></label>
          <label class="check"><input type="checkbox" class="extra" data-price="50" data-label="No elevator, 3rd floor+"> No elevator, 3rd floor+ <span class="price">+$50</span></label>
          <label class="check"><input type="checkbox" class="extra" data-price="0" data-label="Full packing service" id="packing"> Full packing service <span class="price">+15%</span></label>
        </div>
      </div>
    </div>

    <div class="ticket">
      <h2>Estimate</h2>
      <div class="t-line"><span id="rLabor">Labor — 2 movers × 3 hrs</span><span id="rLaborPrice">$—</span></div>
      <div class="t-line muted"><span id="rDist">Distance — 12 mi</span><span id="rDistPrice">$0</span></div>
      <div id="rExtras"></div>
      <div class="t-total">
        <span>Total</span>
        <span class="amount" id="rTotal">$0</span>
      </div>
      <button class="cta">Request this move</button>
      <div class="note">Estimate only — confirmed after a quick call</div>
    </div>
  </div>
</div>

<script>
  let movers = 2;
  let baseHours = 3;

  document.querySelectorAll('#sizeRow .pill').forEach(p=>{
    p.addEventListener('click', ()=>{
      document.querySelectorAll('#sizeRow .pill').forEach(x=>x.classList.remove('active'));
      p.classList.add('active');
      movers = parseInt(p.dataset.movers);
      baseHours = parseInt(p.dataset.hours);
      document.getElementById('moversVal').textContent = movers;
      document.getElementById('gaugeFill').style.width = p.dataset.fill + '%';
      document.getElementById('gaugePct').textContent = p.dataset.fill + '%';
      calc();
    });
  });

  function step(dir){
    movers = Math.max(2, Math.min(8, movers+dir));
    document.getElementById('moversVal').textContent = movers;
    calc();
  }

  document.getElementById('dist').addEventListener('input', calc);
  document.querySelectorAll('.extra').forEach(c=> c.addEventListener('change', calc));

  function calc(){
    const dist = parseInt(document.getElementById('dist').value);
    document.getElementById('distVal').textContent = dist + ' mi';

    const rate = 45;
    const labor = rate * movers * baseHours;

    const freeMiles = 50;
    const distFee = dist > freeMiles ? (dist - freeMiles) * 0.9 : 0;

    let extrasTotal = 0;
    let extrasHtml = '';
    let packingPct = 0;
    document.querySelectorAll('.extra:checked').forEach(c=>{
      if(c.id === 'packing'){
        packingPct = 0.15;
        extrasHtml += `<div class="t-line muted"><span>Full packing service</span><span>+15%</span></div>`;
      } else {
        const price = parseFloat(c.dataset.price);
        extrasTotal += price;
        extrasHtml += `<div class="t-line muted"><span>${c.dataset.label}</span><span>+$${price}</span></div>`;
      }
    });

    let subtotal = labor + distFee + extrasTotal;
    let packingFee = subtotal * packingPct;
    let total = subtotal + packingFee;

    document.getElementById('rLabor').textContent = `Labor — ${movers} movers × ${baseHours} hrs`;
    document.getElementById('rLaborPrice').textContent = `$${labor.toFixed(0)}`;
    document.getElementById('rDist').textContent = `Distance — ${dist} mi`;
    document.getElementById('rDistPrice').textContent = distFee > 0 ? `+$${distFee.toFixed(0)}` : '$0';
    document.getElementById('rExtras').innerHTML = extrasHtml;
    document.getElementById('rTotal').textContent = `$${total.toFixed(0)}`;
  }

  calc();
</script>
</body>
</html>
