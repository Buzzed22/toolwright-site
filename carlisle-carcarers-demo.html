<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Carlisle CarCarers — Instant Quote</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #ECEDEF;
    --card: #FFFFFF;
    --ink: #1C2126;
    --ink-soft: #5B6470;
    --charcoal: #23272E;
    --cyan: #2FA3C9;
    --line: #DADCE1;
    --radius: 12px;
  }
  *{ box-sizing:border-box; }
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:'Inter', sans-serif; padding:40px 20px;
  }
  .wrap{ max-width:980px; margin:0 auto; }
  .masthead{
    display:flex; align-items:baseline; justify-content:space-between;
    margin-bottom:26px; flex-wrap:wrap; gap:10px;
  }
  .brand{
    font-family:'Rajdhani', sans-serif; font-weight:700; font-size:30px;
    text-transform:uppercase; letter-spacing:0.02em; color:var(--charcoal);
  }
  .brand span{ color:var(--cyan); }
  .tag{ font-size:12px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:0.09em; }

  .grid{ display:grid; grid-template-columns: 1.3fr 1fr; gap:26px; }
  @media (max-width:780px){ .grid{ grid-template-columns:1fr; } }

  .card{ background:var(--card); border-radius:var(--radius); border:1px solid var(--line); padding:28px; }
  h2{
    font-family:'Rajdhani', sans-serif; text-transform:uppercase; letter-spacing:0.02em;
    font-weight:700; font-size:19px; margin:0 0 20px 0; color:var(--charcoal);
  }
  .field{ margin-bottom:22px; }
  .field label{ display:flex; justify-content:space-between; font-size:14px; font-weight:500; margin-bottom:8px; }

  .pillgrid{ display:grid; grid-template-columns:repeat(2,1fr); gap:8px; }
  .pillrow{ display:flex; gap:8px; flex-wrap:wrap; }
  .pill{
    padding:9px 12px; border-radius:8px; border:1px solid var(--line);
    background:var(--bg); font-size:13px; cursor:pointer; color:var(--ink-soft); text-align:center;
  }
  .pill.active{ background:var(--charcoal); color:white; border-color:var(--charcoal); }

  .checks{ display:flex; flex-direction:column; gap:10px; }
  .check{ display:flex; align-items:center; gap:10px; font-size:14px; cursor:pointer; }
  .check input{ accent-color: var(--cyan); width:16px; height:16px; }
  .check .price{ margin-left:auto; font-family:'Space Mono', monospace; color:var(--ink-soft); font-size:13px; }

  .ticket{ background:var(--charcoal); color:white; border-radius:var(--radius); padding:26px; }
  .ticket h2{ color:white; }
  .t-line{
    display:flex; justify-content:space-between; font-family:'Space Mono', monospace;
    font-size:13px; padding:8px 0; border-bottom:1px dashed rgba(255,255,255,0.2);
  }
  .t-line.muted{ opacity:0.7; }
  .t-total{ display:flex; justify-content:space-between; align-items:baseline; margin-top:16px; }
  .t-total .amount{ font-family:'Space Mono', monospace; font-size:34px; font-weight:700; color:#7FD4EE; }
  .cta{
    display:block; width:100%; margin-top:18px; padding:14px; border:none; border-radius:8px;
    background:var(--cyan); color:white; font-family:'Inter', sans-serif; font-weight:700; font-size:14px; cursor:pointer;
  }
  .note{ text-align:center; font-size:11px; color:var(--ink-soft); margin-top:10px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="masthead">
    <div class="brand">Carlisle <span>CarCarers</span></div>
    <div class="tag">Instant Quote</div>
  </div>

  <div class="grid">
    <div class="card">
      <h2>Your vehicle</h2>

      <div class="field">
        <label>Vehicle size</label>
        <div class="pillgrid" id="sizeRow">
          <div class="pill active" data-mult="0.8">Small car</div>
          <div class="pill" data-mult="1.0">Medium car</div>
          <div class="pill" data-mult="1.2">Large car</div>
          <div class="pill" data-mult="1.3">SUV / 4x4</div>
        </div>
      </div>

      <div class="field">
        <label>Service</label>
        <div class="pillrow" id="serviceRow">
          <div class="pill active" data-base="25">Wash &amp; wax</div>
          <div class="pill" data-base="60">Full valet</div>
          <div class="pill" data-base="180">Paint correction</div>
          <div class="pill" data-base="350">Ceramic coating</div>
        </div>
      </div>

      <div class="field" style="margin-bottom:0;">
        <label>Add-ons</label>
        <div class="checks">
          <label class="check"><input type="checkbox" class="extra" data-price="40" data-label="Interior deep clean"> Interior deep clean <span class="price">+£40</span></label>
          <label class="check"><input type="checkbox" class="extra" data-price="25" data-label="Pet hair removal"> Pet hair removal <span class="price">+£25</span></label>
          <label class="check"><input type="checkbox" class="extra" data-price="35" data-label="Headlight restoration"> Headlight restoration <span class="price">+£35</span></label>
        </div>
      </div>
    </div>

    <div class="ticket">
      <h2>Estimate</h2>
      <div class="t-line"><span id="rService">Wash &amp; wax · Small car</span><span id="rBase">£—</span></div>
      <div id="rExtras"></div>
      <div class="t-total">
        <span>Total</span>
        <span class="amount" id="rTotal">£0</span>
      </div>
      <button class="cta">Book this service</button>
      <div class="note">Estimate only — Craig confirms final price on inspection</div>
    </div>
  </div>
</div>

<script>
  document.querySelectorAll('#sizeRow .pill').forEach(p=>{
    p.addEventListener('click', ()=>{
      document.querySelectorAll('#sizeRow .pill').forEach(x=>x.classList.remove('active'));
      p.classList.add('active');
      calc();
    });
  });

  document.querySelectorAll('#serviceRow .pill').forEach(p=>{
    p.addEventListener('click', ()=>{
      document.querySelectorAll('#serviceRow .pill').forEach(x=>x.classList.remove('active'));
      p.classList.add('active');
      calc();
    });
  });

  document.querySelectorAll('.extra').forEach(c=> c.addEventListener('change', calc));

  function calc(){
    const sizePill = document.querySelector('#sizeRow .pill.active');
    const mult = parseFloat(sizePill.dataset.mult);
    const sizeName = sizePill.textContent;

    const servicePill = document.querySelector('#serviceRow .pill.active');
    const baseRate = parseFloat(servicePill.dataset.base);
    const serviceName = servicePill.textContent;

    const base = baseRate * mult;

    let extrasTotal = 0;
    let extrasHtml = '';
    document.querySelectorAll('.extra:checked').forEach(c=>{
      const price = parseFloat(c.dataset.price);
      extrasTotal += price;
      extrasHtml += `<div class="t-line muted"><span>${c.dataset.label}</span><span>+£${price}</span></div>`;
    });

    const total = base + extrasTotal;

    document.getElementById('rService').textContent = `${serviceName} · ${sizeName}`;
    document.getElementById('rBase').textContent = `£${base.toFixed(0)}`;
    document.getElementById('rExtras').innerHTML = extrasHtml;
    document.getElementById('rTotal').textContent = `£${total.toFixed(0)}`;
  }

  calc();
</script>
</body>
</html>
