<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RB Landscaping — Instant Quote</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@600;700&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #E9EAE4;
    --card: #FFFFFF;
    --ink: #2B2E28;
    --ink-soft: #5F675A;
    --moss: #5C7A5E;
    --clay: #B5603F;
    --line: #D7D9CF;
    --radius: 12px;
  }
  *{ box-sizing:border-box; }
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:'Inter', sans-serif; padding:40px 20px;
  }
  .wrap{ max-width:1000px; margin:0 auto; }
  .masthead{
    display:flex; align-items:baseline; justify-content:space-between;
    margin-bottom:26px; flex-wrap:wrap; gap:10px;
  }
  .brand{
    font-family:'Zilla Slab', serif; font-weight:700; font-size:32px;
    color:var(--moss);
  }
  .brand span{ color:var(--clay); }
  .tag{ font-size:12px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:0.09em; }

  .grid{ display:grid; grid-template-columns: 1.3fr 1fr; gap:26px; }
  @media (max-width:780px){ .grid{ grid-template-columns:1fr; } }

  .card{ background:var(--card); border-radius:var(--radius); border:1px solid var(--line); padding:28px; }
  h2{
    font-family:'Zilla Slab', serif; font-weight:700; font-size:20px;
    margin:0 0 20px 0; color:var(--moss);
  }
  .field{ margin-bottom:22px; }
  .field label{ display:flex; justify-content:space-between; font-size:14px; font-weight:500; margin-bottom:8px; }
  .field label .val{ font-family:'Space Mono', monospace; color:var(--clay); font-weight:700; }
  input[type=range]{ width:100%; accent-color: var(--moss); }

  .pillgrid{ display:grid; grid-template-columns:repeat(2,1fr); gap:8px; }
  .pill{
    padding:10px 14px; border-radius:8px; border:1px solid var(--line);
    background:var(--bg); font-size:13px; cursor:pointer; color:var(--ink-soft); text-align:center;
  }
  .pill.active{ background:var(--moss); color:white; border-color:var(--moss); }

  .checks{ display:flex; flex-direction:column; gap:10px; }
  .check{ display:flex; align-items:center; gap:10px; font-size:14px; cursor:pointer; }
  .check input{ accent-color: var(--clay); width:16px; height:16px; }
  .check .price{ margin-left:auto; font-family:'Space Mono', monospace; color:var(--ink-soft); font-size:13px; }

  .ticket{ background:var(--moss); color:white; border-radius:var(--radius); padding:26px; }
  .ticket h2{ color:white; }
  .t-line{
    display:flex; justify-content:space-between; font-family:'Space Mono', monospace;
    font-size:13px; padding:8px 0; border-bottom:1px dashed rgba(255,255,255,0.25);
  }
  .t-line.muted{ opacity:0.75; }
  .t-total{ display:flex; justify-content:space-between; align-items:baseline; margin-top:16px; }
  .t-total .amount{ font-family:'Space Mono', monospace; font-size:34px; font-weight:700; color:#F3D3C4; }
  .cta{
    display:block; width:100%; margin-top:18px; padding:14px; border:none; border-radius:8px;
    background:var(--clay); color:white; font-family:'Inter', sans-serif; font-weight:700; font-size:14px; cursor:pointer;
  }
  .note{ text-align:center; font-size:11px; color:var(--ink-soft); margin-top:10px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="masthead">
    <div class="brand">RB <span>Landscaping</span></div>
    <div class="tag">Instant Quote · Carlisle &amp; Cumbria</div>
  </div>

  <div class="grid">
    <div class="card">
      <h2>Your project</h2>

      <div class="field">
        <label>Project type</label>
        <div class="pillgrid" id="typeRow">
          <div class="pill active" data-rate="70">Patio</div>
          <div class="pill" data-rate="90">Decking</div>
          <div class="pill" data-rate="80">Driveway / block paving</div>
          <div class="pill" data-rate="45">Artificial lawn</div>
        </div>
      </div>

      <div class="field">
        <label>Area <span class="val" id="areaVal">30 m²</span></label>
        <input type="range" id="area" min="5" max="200" step="5" value="30">
      </div>

      <div class="field" style="margin-bottom:0;">
        <label>Add-ons</label>
        <div class="checks">
          <label class="check"><input type="checkbox" class="extra" data-price="450" data-label="Dry stone walling"> Dry stone walling <span class="price">+£450</span></label>
          <label class="check"><input type="checkbox" class="extra" data-price="300" data-label="Drainage system"> Drainage system <span class="price">+£300</span></label>
          <label class="check"><input type="checkbox" class="extra" data-price="600" data-label="Fencing installation"> Fencing installation <span class="price">+£600</span></label>
          <label class="check"><input type="checkbox" class="extra" data-price="150" data-label="Design consultation"> Design consultation <span class="price">+£150</span></label>
        </div>
      </div>
    </div>

    <div class="ticket">
      <h2>Estimate</h2>
      <div class="t-line"><span id="rType">Patio · 30 m²</span><span id="rBase">£—</span></div>
      <div id="rExtras"></div>
      <div class="t-total">
        <span>Total</span>
        <span class="amount" id="rTotal">£0</span>
      </div>
      <button class="cta">Request a visit &amp; quote</button>
      <div class="note">Estimate only — Richard confirms final price on-site</div>
    </div>
  </div>
</div>

<script>
  document.querySelectorAll('#typeRow .pill').forEach(p=>{
    p.addEventListener('click', ()=>{
      document.querySelectorAll('#typeRow .pill').forEach(x=>x.classList.remove('active'));
      p.classList.add('active');
      calc();
    });
  });

  document.getElementById('area').addEventListener('input', calc);
  document.querySelectorAll('.extra').forEach(c=> c.addEventListener('change', calc));

  function calc(){
    const area = parseInt(document.getElementById('area').value);
    document.getElementById('areaVal').textContent = area + ' m²';

    const typePill = document.querySelector('#typeRow .pill.active');
    const rate = parseFloat(typePill.dataset.rate);
    const typeName = typePill.textContent;

    const base = area * rate;

    let extrasTotal = 0;
    let extrasHtml = '';
    document.querySelectorAll('.extra:checked').forEach(c=>{
      const price = parseFloat(c.dataset.price);
      extrasTotal += price;
      extrasHtml += `<div class="t-line muted"><span>${c.dataset.label}</span><span>+£${price}</span></div>`;
    });

    const total = base + extrasTotal;

    document.getElementById('rType').textContent = `${typeName} · ${area} m²`;
    document.getElementById('rBase').textContent = `£${base.toFixed(0)}`;
    document.getElementById('rExtras').innerHTML = extrasHtml;
    document.getElementById('rTotal').textContent = `£${total.toFixed(0)}`;
  }

  calc();
</script>
</body>
</html>
