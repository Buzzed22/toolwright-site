<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MG Decorating Services — Instant Quote</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@600;700&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #EEEDE9;
    --card: #FFFFFF;
    --ink: #2A2823;
    --ink-soft: #625E55;
    --slate: #445059;
    --coral: #C15B3F;
    --line: #DEDBD3;
    --radius: 12px;
  }
  *{ box-sizing:border-box; }
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:'Inter', sans-serif; padding:40px 20px;
  }
  .wrap{ max-width:980px; margin:0 auto; }
  .masthead{
    display:flex; align-items:baseline; justify-content:space-between;
    margin-bottom:26px; flex-wrap:wrap; gap:10px;
  }
  .brand{ font-family:'Libre Franklin', sans-serif; font-weight:700; font-size:26px; color:var(--slate); }
  .brand span{ color:var(--coral); }
  .tag{ font-size:12px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:0.09em; }

  .grid{ display:grid; grid-template-columns: 1.3fr 1fr; gap:26px; }
  @media (max-width:780px){ .grid{ grid-template-columns:1fr; } }

  .card{ background:var(--card); border-radius:var(--radius); border:1px solid var(--line); padding:28px; }
  h2{ font-family:'Libre Franklin', sans-serif; font-weight:700; font-size:19px; margin:0 0 20px 0; color:var(--slate); }
  .field{ margin-bottom:22px; }
  .field label{ display:flex; justify-content:space-between; font-size:14px; font-weight:500; margin-bottom:8px; }

  .stepper{ display:flex; align-items:center; gap:14px; }
  .stepper button{
    width:32px; height:32px; border-radius:8px; border:1px solid var(--line);
    background:var(--bg); color:var(--slate); font-size:16px; font-weight:700; cursor:pointer;
  }
  .stepper button:hover{ background:var(--slate); color:white; }
  .stepper .count{ font-family:'Space Mono', monospace; font-size:16px; min-width:18px; text-align:center; }

  .pillrow{ display:flex; gap:8px; flex-wrap:wrap; }
  .pill{
    padding:9px 14px; border-radius:8px; border:1px solid var(--line);
    background:var(--bg); font-size:13px; cursor:pointer; color:var(--ink-soft);
  }
  .pill.active{ background:var(--slate); color:white; border-color:var(--slate); }

  .checks{ display:flex; flex-direction:column; gap:10px; }
  .check{ display:flex; align-items:center; gap:10px; font-size:14px; cursor:pointer; }
  .check input{ accent-color: var(--coral); width:16px; height:16px; }
  .check .price{ margin-left:auto; font-family:'Space Mono', monospace; color:var(--ink-soft); font-size:13px; }

  .ticket{ background:var(--slate); color:white; border-radius:var(--radius); padding:26px; }
  .ticket h2{ color:white; }
  .t-line{
    display:flex; justify-content:space-between; font-family:'Space Mono', monospace;
    font-size:13px; padding:8px 0; border-bottom:1px dashed rgba(255,255,255,0.2);
  }
  .t-line.muted{ opacity:0.75; }
  .t-total{ display:flex; justify-content:space-between; align-items:baseline; margin-top:16px; }
  .t-total .amount{ font-family:'Space Mono', monospace; font-size:34px; font-weight:700; color:#F0B49E; }
  .cta{
    display:block; width:100%; margin-top:18px; padding:14px; border:none; border-radius:8px;
    background:var(--coral); color:white; font-family:'Inter', sans-serif; font-weight:700; font-size:14px; cursor:pointer;
  }
  .note{ text-align:center; font-size:11px; color:var(--ink-soft); margin-top:10px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="masthead">
    <div class="brand">MG <span>Decorating</span></div>
    <div class="tag">Instant Quote · Carlisle</div>
  </div>

  <div class="grid">
    <div class="card">
      <h2>Your room</h2>

      <div class="field">
        <label>Rooms to decorate</label>
        <div class="stepper">
          <button onclick="step(-1)">−</button>
          <div class="count" id="roomsVal">1</div>
          <button onclick="step(1)">+</button>
        </div>
      </div>

      <div class="field">
        <label>Average room size</label>
        <div class="pillrow" id="sizeRow">
          <div class="pill active" data-rate="180">Small</div>
          <div class="pill" data-rate="260">Medium</div>
          <div class="pill" data-rate="360">Large</div>
        </div>
      </div>

      <div class="field" style="margin-bottom:0;">
        <label>Add-ons</label>
        <div class="checks">
          <label class="check"><input type="checkbox" class="extra" data-price="80" data-label="Wallpapering (per room)"> Wallpapering <span class="price">+£80/room</span></label>
          <label class="check"><input type="checkbox" class="extra" data-price="60" data-label="Woodwork &amp; skirting"> Woodwork &amp; skirting <span class="price">+£60/room</span></label>
          <label class="check"><input type="checkbox" class="extra" data-price="120" data-label="Ceiling repairs / lining paper"> Ceiling repairs <span class="price">+£120</span></label>
        </div>
      </div>
    </div>

    <div class="ticket">
      <h2>Estimate</h2>
      <div class="t-line"><span id="rRooms">1 room · Small</span><span id="rBase">£—</span></div>
      <div id="rExtras"></div>
      <div class="t-total">
        <span>Total</span>
        <span class="amount" id="rTotal">£0</span>
      </div>
      <button class="cta">Request this job</button>
      <div class="note">Estimate only — Mark confirms final price on-site</div>
    </div>
  </div>
</div>

<script>
  let rooms = 1;

  function step(dir){
    rooms = Math.max(1, Math.min(10, rooms+dir));
    document.getElementById('roomsVal').textContent = rooms;
    calc();
  }

  document.querySelectorAll('#sizeRow .pill').forEach(p=>{
    p.addEventListener('click', ()=>{
      document.querySelectorAll('#sizeRow .pill').forEach(x=>x.classList.remove('active'));
      p.classList.add('active');
      calc();
    });
  });

  document.querySelectorAll('.extra').forEach(c=> c.addEventListener('change', calc));

  function calc(){
    const sizePill = document.querySelector('#sizeRow .pill.active');
    const rate = parseFloat(sizePill.dataset.rate);
    const sizeName = sizePill.textContent;

    const base = rooms * rate;

    let extrasTotal = 0;
    let extrasHtml = '';
    document.querySelectorAll('.extra:checked').forEach(c=>{
      const price = parseFloat(c.dataset.price) * (c.dataset.label.includes('per room') || c.dataset.label.includes('Woodwork') || c.dataset.label.includes('Wallpapering') ? rooms : 1);
      extrasTotal += price;
      extrasHtml += `<div class="t-line muted"><span>${c.dataset.label}</span><span>+£${price.toFixed(0)}</span></div>`;
    });

    const total = base + extrasTotal;

    document.getElementById('rRooms').textContent = `${rooms} room${rooms>1?'s':''} · ${sizeName}`;
    document.getElementById('rBase').textContent = `£${base.toFixed(0)}`;
    document.getElementById('rExtras').innerHTML = extrasHtml;
    document.getElementById('rTotal').textContent = `£${total.toFixed(0)}`;
  }

  calc();
</script>
</body>
</html>
